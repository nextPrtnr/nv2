name: Submission Review Pipeline

on:
  issues:
    types: [labeled]
  push:
    branches: [main]
    paths:
      - 'data/opportunities.json'
      - 'data/partners.json'
      - 'css/**'
      - 'js/**'
      - 'index.html'
      - 'netlify.toml'
  workflow_dispatch:

jobs:
  validate:
    name: Validate Data Files
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Validate opportunities.json
        run: |
          python3 -c "
          import json, sys, re
          with open('data/opportunities.json') as f:
            data = json.load(f)
          required = ['id','title','org','category','deadline','link','description']
          errors = []; ids = []
          for i, opp in enumerate(data):
            label = opp.get('id', f'entry {i}')
            for field in required:
              if field not in opp or not str(opp[field]).strip():
                errors.append(f'{label}: missing \"{field}\"')
            if opp.get('id') in ids:
              errors.append(f'Duplicate ID: {opp.get(\"id\")}')
            ids.append(opp.get('id'))
            if opp.get('deadline') and not re.match(r'^\d{4}-\d{2}-\d{2}$', str(opp['deadline'])):
              errors.append(f'{label}: deadline must be YYYY-MM-DD')
          if errors:
            print('Validation FAILED:'); [print(' -', e) for e in errors]; sys.exit(1)
          print(f'OK: {len(data)} opportunities valid')
          "

  deploy:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: '.'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "${{ github.event.head_commit.message }}"
          enable-pull-request-comment: true
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 3

      - name: Telegram deploy notification
        run: |
          if [ -n "$BOT" ] && [ -n "$CHAT" ]; then
            COUNT=$(python3 -c "import json; print(len(json.load(open('data/opportunities.json'))))")
            curl -s "https://api.telegram.org/bot${BOT}/sendMessage" \
              -d "chat_id=${CHAT}&text=✅ nextECA deployed — ${COUNT} opps live. https://nexteca.club&parse_mode=Markdown" > /dev/null
          fi
        env:
          BOT:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}

  auto-publish:
    name: Auto-publish Approved Submission
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.label.name == 'approved'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract and add opportunity
        id: extract
        run: |
          python3 - << 'EOF'
          import re, json, os, sys
          body = open('/tmp/issue_body.txt').read()
          match = re.search(r'```json\s*([\s\S]*?)\s*```', body)
          if not match:
            print('No JSON block found'); sys.exit(1)
          try:
            opp = json.loads(match.group(1).strip())
          except Exception as e:
            print(f'JSON parse error: {e}'); sys.exit(1)
          with open('data/opportunities.json') as f:
            opps = json.load(f)
          if opp.get('id') in [o.get('id') for o in opps]:
            print(f'Duplicate ID {opp["id"]} — skipping')
            open('/tmp/skip','w').write('1')
            sys.exit(0)
          opps.append(opp)
          with open('data/opportunities.json','w') as f:
            json.dump(opps, f, indent=2, ensure_ascii=False); f.write('\n')
          print(f'Added: {opp.get("title")}')
          with open(os.environ['GITHUB_OUTPUT'],'a') as f:
            f.write(f'title={opp.get("title","New Opportunity")}\n')
            f.write(f'opp_id={opp.get("id","")}\n')
          EOF

      - name: Write issue body to file
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            fs.writeFileSync('/tmp/issue_body.txt', context.payload.issue.body || '');

      - name: Commit new opportunity
        run: |
          [ -f /tmp/skip ] && exit 0
          git config user.name "nextECA Bot"
          git config user.email "bot@nexteca.club"
          git add data/opportunities.json
          git commit -m "Add: ${{ steps.extract.outputs.title }} [from issue #${{ github.event.issue.number }}]"
          git push

      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ **Published!** Added to `data/opportunities.json` and deploying now. Live at https://nexteca.club in ~60 seconds.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
